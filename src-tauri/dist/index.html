<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Wiki — Phase 2 smoke UI</title>
  <style>
    :root { color-scheme: light dark; --gap: 0.75rem; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      max-width: 38rem; margin: 2rem auto; padding: 0 1rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0; }
    .sub { color: #888; margin-top: 0.25rem; }
    fieldset { border: 1px solid #ccc4; border-radius: 6px; padding: 1rem; margin-top: 1.25rem; }
    legend { padding: 0 0.4rem; font-weight: 600; }
    label { display: block; margin-top: 0.6rem; }
    input { width: 100%; padding: 0.45rem 0.55rem; font: inherit; border: 1px solid #ccc6; border-radius: 4px; box-sizing: border-box; }
    button {
      padding: 0.5rem 0.9rem; font: inherit; border: 1px solid #6886; border-radius: 4px;
      background: #4a90e2; color: white; cursor: pointer; margin-top: 0.7rem; margin-right: var(--gap);
    }
    button.secondary { background: transparent; color: inherit; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre {
      background: #1112; border-radius: 4px; padding: 0.75rem; overflow-x: auto;
      font: 12px/1.45 ui-monospace, "SF Mono", Menlo, monospace; white-space: pre-wrap; word-break: break-word;
    }
    .status { padding: 0.4rem 0.7rem; border-radius: 4px; display: inline-block; font-size: 0.85rem; }
    .status.in { background: #2c2; color: white; }
    .status.out { background: #c33; color: white; }
    .row { display: flex; align-items: center; gap: var(--gap); flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>LLM Wiki — server smoke UI</h1>
  <p class="sub">Phase 2 placeholder. Real frontend lands in Phase 5–6.</p>

  <fieldset>
    <legend>Status</legend>
    <div class="row">
      <span id="status" class="status out">checking…</span>
      <span id="user-info"></span>
      <button id="refresh-btn" class="secondary">Refresh</button>
    </div>
  </fieldset>

  <fieldset id="login-box">
    <legend>Login</legend>
    <label>Username
      <input id="username" autocomplete="username" />
    </label>
    <label>Password
      <input id="password" type="password" autocomplete="current-password" />
    </label>
    <button id="login-btn">Log in</button>
  </fieldset>

  <fieldset id="actions-box" hidden>
    <legend>Actions (logged in)</legend>
    <div class="row">
      <button id="whoami-btn">GET /api/v1/auth/whoami</button>
      <button id="health-btn">GET /api/v1/health</button>
      <button id="logout-btn" class="secondary">Log out</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Last response</legend>
    <div class="row" style="margin-bottom: 0.5rem;">
      <span id="last-meta" class="sub">—</span>
    </div>
    <pre id="response">(no requests yet)</pre>
  </fieldset>

  <script>
    const statusEl = document.getElementById('status');
    const userInfoEl = document.getElementById('user-info');
    const loginBox = document.getElementById('login-box');
    const actionsBox = document.getElementById('actions-box');
    const responseEl = document.getElementById('response');
    const lastMetaEl = document.getElementById('last-meta');

    async function call(method, path, body) {
      const t0 = performance.now();
      const init = { method, credentials: 'include', headers: {} };
      if (body !== undefined) {
        init.headers['Content-Type'] = 'application/json';
        init.body = JSON.stringify(body);
      }
      const resp = await fetch(path, init);
      const text = await resp.text();
      let parsed = text;
      try { parsed = JSON.stringify(JSON.parse(text), null, 2); } catch (_) {}
      const dt = (performance.now() - t0).toFixed(0);
      lastMetaEl.textContent = `${method} ${path} → ${resp.status} (${dt}ms)`;
      responseEl.textContent = parsed || '(empty body)';
      return resp;
    }

    async function refresh() {
      const resp = await call('GET', '/api/v1/auth/whoami');
      if (resp.ok) {
        const data = JSON.parse(responseEl.textContent);
        statusEl.textContent = 'logged in';
        statusEl.className = 'status in';
        userInfoEl.textContent = `as ${data.username} (id=${data.user_id})`;
        loginBox.hidden = true;
        actionsBox.hidden = false;
      } else {
        statusEl.textContent = 'logged out';
        statusEl.className = 'status out';
        userInfoEl.textContent = '';
        loginBox.hidden = false;
        actionsBox.hidden = true;
      }
    }

    document.getElementById('refresh-btn').onclick = refresh;

    document.getElementById('login-btn').onclick = async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      await call('POST', '/api/v1/auth/login', { username, password });
      await refresh();
    };

    document.getElementById('whoami-btn').onclick = () => call('GET', '/api/v1/auth/whoami');
    document.getElementById('health-btn').onclick = () => call('GET', '/api/v1/health');
    document.getElementById('logout-btn').onclick = async () => {
      await call('POST', '/api/v1/auth/logout');
      await refresh();
    };

    refresh();
  </script>
</body>
</html>
